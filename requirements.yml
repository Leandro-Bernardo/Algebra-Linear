name: linalg
channels:
  - defaults
  - conda-forge
dependencies:
  - nomkl # Fixando a inclusão da libiomp5md.dll para não acontecer duplicação por instalar uma parte das libs por conda e outra por pip
  - python==3.10
  - pip
  - setuptools==80.9.0
  - numpy #==1.24.4
  - pandas #==2.0.3
  - scipy==1.10.1
  - matplotlib==3.7.1
  - pillow==9.4.0
  - pyyaml==6.0
  - datasets
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu118
    - torch==2.0.1+cu118
    - torchvision==0.15.2+cu118
    - torchaudio==2.0.2+cu118
    - lightning        # Versão compatível com Torch 2.0.x
    - torchmetrics    # Versão estável para a época do Torch 2.0
    #- fft-conv-pytorch
    - datasets==4.0.0
    - opencv-python==4.7.0.72
    - wandb
    - GitPython==3.1.46
    - scikit-image==0.21.0
    - scikit-learn==1.6.1
    - seaborn==0.13.2
    - statsmodels==0.14.6
    - plotly==6.0.0
    - xlsxwriter==3.2.2